services:
  - type: web
    name: personal-finance-tracker
    runtime: node
    plan: free
    buildCommand: npm ci && npm --prefix client ci && npm --prefix client run build
    startCommand: npm start
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: DB_SSL_CA
        sync: false
      - key: JWT_SECRET
        sync: false
